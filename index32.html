        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

            width: 100%; max-width: 500px; background: var(--card); padding: 30px; 
            border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative;
        }

        .theme-switch { 
            background: var(--btn-ghost); color: var(--text); width: 40px; height: 40px;

function toggleTheme() {
    const b = document.body;
    const isLight = b.getAttribute('data-theme') === 'light';
    b.setAttribute('data-theme', isLight ? 'dark' : 'light');
    document.getElementById('themeIcon').setAttribute('name', isLight ? 'sunny-outline' : 'moon-outline');
}
function openReport() { document.getElementById('reportModal').style.display = 'flex'; }
function closeReport() { document.getElementById('reportModal').style.display = 'none'; }
function submitReport() {
    const type = document.getElementById('reportType').value;
    const msg = document.getElementById('reportDetails').value;
    fetch("https://formspree.io/f/jaytristanmedallon12345@gmail.com", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ category: currentCat, exam: currentExamIdx, question: currentQs[curIdx].q, issue: type, details: msg })
    }).then(() => { alert("Sent!"); closeReport(); });
}

function setScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.getElementById('scoreBox').style.display = (id === 'quiz') ? 'block' : 'none';
}

function openExams(cat) {
    currentCat = cat;
    document.getElementById('catTitle').innerText = cat.toUpperCase();
    const grid = document.getElementById('examGrid'); grid.innerHTML = "";
    const totalExams = (cat === "Plumbing Arithmetic") ? 10 : 15;
    for(let i=1; i<=totalExams; i++) {
        grid.innerHTML += `<div class="exam-row"><button class="btn-exam" onclick="startQuiz(${i})">EXAM #${i}</button>
            <button class="btn-eye" onclick="showReview(${i}, true)"><ion-icon name="eye-outline"></ion-icon></button></div>`;
    }
    setScreen('exams');
}

function startQuiz(idx) {
    currentExamIdx = idx;
    currentQs = DB[currentCat]?.[idx] || [{q: "Questions coming soon.", choices: ["Back"], a: 0}];
    curIdx = 0; answers = new Array(currentQs.length).fill(null);
    isRevealed = false;
    setScreen('quiz'); loadQ();
}

function loadQ() {
    isRevealed = false;
    document.getElementById('ansFeedback').innerText = "";
    const q = currentQs[curIdx];
    document.getElementById('qNum').innerText = `EXAM #${currentExamIdx} • Q${curIdx+1}`;
    document.getElementById('qTxt').innerText = q.q;
    const box = document.getElementById('choices'); box.innerHTML = "";
    
    q.choices.forEach((c, i) => {
        const b = document.createElement('button');
        b.innerText = c;
        if(answers[curIdx] !== null) {
            b.disabled = true;
            if(i === q.a) b.classList.add('correct');
            else if(i === answers[curIdx]) b.classList.add('wrong');
        }
        b.onclick = () => {
            answers[curIdx] = i;
            Array.from(box.children).forEach(btn => btn.style.border = "none");
            b.style.border = "2px solid var(--accent)";
            updateScore();
        };
        box.appendChild(b);
    });
}

function prevQ() {
    if (curIdx === 0) { openExams(currentCat); } 
    else { curIdx--; loadQ(); }
}

function handleNextLogic() {
    if(answers[curIdx] === null) {
        document.getElementById('appBody').classList.add('shake');
        setTimeout(() => document.getElementById('appBody').classList.remove('shake'), 400);
        return;
    }
    if(!isRevealed) { revealCurrentAnswer(); isRevealed = true; return; }
    nextQ();
}

function revealCurrentAnswer() {
    const q = currentQs[curIdx];
    const box = document.getElementById('choices');
    const feedback = document.getElementById('ansFeedback');
    Array.from(box.children).forEach((btn, i) => {
        btn.disabled = true;
        btn.style.border = "none";
        if(i === q.a) btn.classList.add('correct');
        else if(i === answers[curIdx]) btn.classList.add('wrong');
    });
    feedback.innerText = (answers[curIdx] === q.a) ? "Correct!" : "Wrong! Answer: " + q.choices[q.a];
    feedback.style.color = (answers[curIdx] === q.a) ? "var(--success)" : "var(--danger)";
}

function updateScore() {
    score = answers.filter((a, i) => a === currentQs[i].a).length;
    document.getElementById('scoreBox').innerText = `${score} / ${currentQs.length}`;
}

function nextQ() { 
    if(curIdx < currentQs.length - 1) { curIdx++; loadQ(); } 
    else { showReview(null, false); }
}

function showReview(idx, isStudy) {
    const list = isStudy ? DB[currentCat][idx] : currentQs;
    const scroll = document.getElementById('revScroll'); scroll.innerHTML = "";
    document.getElementById('resScore').innerText = isStudy ? `EXAM #${idx} GUIDE` : `RESULT: ${score}/${list.length}`;
    if(!list) { scroll.innerHTML = "No questions here."; }
    else {
        list.forEach((q, i) => {
            const isWrong = !isStudy && answers[i] !== q.a;
            scroll.innerHTML += `<div style="padding:15px; background:var(--bg); border-radius:12px; margin-bottom:10px;">
                <b style="font-size:13px;">${i+1}. ${q.q}</b><br>
                <small style="color:var(--success); font-weight:700;">✔ ${q.choices[q.a]}</small>
                ${isWrong ? `<br><small style="color:var(--danger); font-weight:700;">✖ ${q.choices[answers[i]]}</small>` : ''}
            </div>`;
        });
    }
    setScreen('results');
}
</script>
